{% extends "base.html" %}

{% block content %}
  <div class="card" style="width: 12rem;">
    <div class="card-body">
      <h4>
        Hi,
        {% if user.first_name and user.last_name %}
          {{ user.first_name }} {{ user.last_name }}
        {% else %}
          {{ user.username }}
        {% endif %}
      </h4>
    </div>
  </div>
  <div class="text-center">
    <h1>Welcome to Task Manager</h1>
  </div>
{% endblock %}
